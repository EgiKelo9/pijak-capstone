name: CD – Build, Push & Deploy

on:
  push:
    branches: ["master"]
  # Bisa juga di-trigger manual dari GitHub UI
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Build & Push semua Docker images
  # ─────────────────────────────────────────────
  build-and-push:
    name: 🐳 Build & Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Mengubah nama owner menjadi lowercase
      - name: Lowercase Registry Owner
        id: owner
        run: |
          echo "owner_lc=${OWNER,,}" >> $GITHUB_OUTPUT
        env:
          OWNER: '${{ github.repository_owner }}'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ steps.owner.outputs.owner_lc }}/pijak-backend
            ghcr.io/${{ steps.owner.outputs.owner_lc }}/pijak-frontend
            ghcr.io/${{ steps.owner.outputs.owner_lc }}/pijak-ml-services
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      # ── Backend ──
      - name: Build & Push – backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.owner_lc }}/pijak-backend:${{ steps.meta.outputs.version }}
            ghcr.io/${{ steps.owner.outputs.owner_lc }}/pijak-backend:latest
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      # ── ML Services ──
      - name: Build & Push – ml_services
        uses: docker/build-push-action@v6
        with:
          context: ./ml_services
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.owner_lc }}/pijak-ml-services:${{ steps.meta.outputs.version }}
            ghcr.io/${{ steps.owner.outputs.owner_lc }}/pijak-ml-services:latest
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=ml-services
          cache-to: type=gha,mode=max,scope=ml-services

      # ── Frontend ──
      - name: Build & Push – frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_ML_API_URL=${{ secrets.NEXT_PUBLIC_ML_API_URL }}
          tags: |
            ghcr.io/${{ steps.owner.outputs.owner_lc }}/pijak-frontend:${{ steps.meta.outputs.version }}
            ghcr.io/${{ steps.owner.outputs.owner_lc }}/pijak-frontend:latest
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  # ─────────────────────────────────────────────
  # JOB 2: Deploy ke server via SSH (Tailscale)
  # ─────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Production Server
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production  # Opsional: bisa dikonfigurasi di GitHub repo settings

    steps:
      - name: Checkout code (untuk docker-compose.yml)
        uses: actions/checkout@v4

      # Setup Tailscale agar GitHub runner bisa reach server kamu
      - name: Setup Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      # Tunggu Tailscale siap & verifikasi host reachable
      - name: Wait for Tailscale & verify connectivity
        run: |
          echo "==> Waiting for Tailscale to stabilize..."
          sleep 5
          echo "==> Pinging deploy host..."
          ping -c 3 ${{ secrets.DEPLOY_HOST }} || echo "WARNING: host unreachable via ping (may still work)"
          echo "==> Testing TCP port 22 on deploy host..."
          nc -zv -w 10 ${{ secrets.DEPLOY_HOST }} 22 && echo "Port 22 is OPEN" || echo "ERROR: Port 22 is NOT reachable"

      # Tulis SSH key ke file temp, lalu deploy via native ssh
      # DEPLOY_SSH_KEY harus disimpan sebagai base64 (satu baris) di GitHub Secret
      - name: Deploy via SSH (native)
        env:
          SSH_KEY_B64: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          GHCR_TOKEN: ${{ secrets.DEPLOY_GHCR_TOKEN }}
          GHCR_USER: ${{ secrets.DEPLOY_GHCR_USER }}
        run: |
          # ── 1. Decode dan tulis SSH key ke file temp ──
          KEY_FILE=$(mktemp)
          echo "$SSH_KEY_B64" | base64 -d > "$KEY_FILE"
          chmod 600 "$KEY_FILE"

          # ── 2. Verifikasi key bisa dibaca ──
          ssh-keygen -l -f "$KEY_FILE" && echo "Key OK" || { echo "ERROR: invalid key"; rm -f "$KEY_FILE"; exit 1; }

          # ── 3. SSH ke server dan jalankan deploy script ──
          ssh -i "$KEY_FILE" \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -p 22 \
            "${DEPLOY_USER}@${DEPLOY_HOST}" bash -s << EOF
          set -e
          echo "==> Navigating to project directory"
          cd "${DEPLOY_PATH}"

          echo "==> Pulling latest changes from Git"
          git pull origin master

          echo "==> Logging in to GitHub Container Registry"
          echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USER}" --password-stdin

          echo "==> Pulling latest images"
          docker compose -f docker-compose.prod.yml pull

          echo "==> Restarting services with zero-downtime"
          docker compose -f docker-compose.prod.yml up -d --remove-orphans

          echo "==> Cleaning up dangling images"
          docker image prune -f

          echo "✅ Deployment complete!"
          EOF

          # ── 4. Hapus key file setelah selesai ──
          rm -f "$KEY_FILE"