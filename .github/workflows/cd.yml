name: CD – Build, Push & Deploy

on:
  push:
    branches: ["main"]
  # Bisa juga di-trigger manual dari GitHub UI
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Build & Push semua Docker images
  # ─────────────────────────────────────────────
  build-and-push:
    name: 🐳 Build & Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      # Tag image yang dipakai (SHA pendek), diteruskan ke job deploy
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.IMAGE_PREFIX }}/pijak-backend
            ${{ env.IMAGE_PREFIX }}/pijak-frontend
            ${{ env.IMAGE_PREFIX }}/pijak-ml-services
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      # ── Backend ──
      - name: Build & Push – backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/pijak-backend:${{ steps.meta.outputs.version }}
            ${{ env.IMAGE_PREFIX }}/pijak-backend:latest
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      # ── ML Services ──
      - name: Build & Push – ml_services
        uses: docker/build-push-action@v6
        with:
          context: ./ml_services
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/pijak-ml-services:${{ steps.meta.outputs.version }}
            ${{ env.IMAGE_PREFIX }}/pijak-ml-services:latest
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=ml-services
          cache-to: type=gha,mode=max,scope=ml-services

      # ── Frontend ──
      - name: Build & Push – frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_ML_API_URL=${{ secrets.NEXT_PUBLIC_ML_API_URL }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/pijak-frontend:${{ steps.meta.outputs.version }}
            ${{ env.IMAGE_PREFIX }}/pijak-frontend:latest
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  # ─────────────────────────────────────────────
  # JOB 2: Deploy ke server via SSH (Tailscale)
  # ─────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Production Server
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production  # Opsional: bisa dikonfigurasi di GitHub repo settings

    steps:
      - name: Checkout code (untuk docker-compose.yml)
        uses: actions/checkout@v4

      # Setup Tailscale agar GitHub runner bisa reach server kamu
      - name: Setup Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}        # Tailscale IP atau hostname server kamu
          username: ${{ secrets.DEPLOY_USER }}    # e.g. ubuntu
          key: ${{ secrets.DEPLOY_SSH_KEY }}      # Private key untuk SSH
          port: 22
          script: |
            set -e
            echo "==> Navigating to project directory"
            cd ${{ secrets.DEPLOY_PATH }}         # e.g. /home/ubuntu/pijak-capstone

            echo "==> Logging in to GitHub Container Registry"
            echo "${{ secrets.DEPLOY_GHCR_TOKEN }}" | docker login ghcr.io \
              -u ${{ secrets.DEPLOY_GHCR_USER }} --password-stdin

            echo "==> Pulling latest images"
            docker compose -f docker-compose.prod.yml pull

            echo "==> Restarting services with zero-downtime"
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            echo "==> Cleaning up dangling images"
            docker image prune -f

            echo "✅ Deployment complete!"
