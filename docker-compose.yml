version: "3.8"

services:
  # 1. Next.js Front-End
  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
        - NEXT_PUBLIC_ML_API_URL=${NEXT_PUBLIC_ML_API_URL}
    ports:
      - "3000:3000"
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_PUBLIC_ML_API_URL=${NEXT_PUBLIC_ML_API_URL}
    depends_on:
      - backend

  # 2. FastAPI Back-End
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DATABASE_NAME=${DATABASE_NAME}
      - ML_SERVICE_URL=${ML_SERVICE_URL:-http://ml_services:8000}
      - BACKEND_BASE_URL=${BACKEND_BASE_URL}
      - SECRET_KEY=${SECRET_KEY}
      - ALGORITHM=${ALGORITHM}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES}
      - ENV=prod
      - ML_API_KEY=${ML_API_KEY}
    depends_on:
      db:
        condition: service_healthy
      ml_services:
        condition: service_started

  # 3. PostgreSQL Database
  db:
    image: postgres:15-alpine
    # Bind to localhost to prevent public internet access to database port
    ports:
      - "5432:5432"
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # 4. ML Services (Time-Series Forecasting & LLM)
  ml_services:
    build: ./ml_services
    ports:
      - "8000:8000"
    restart: unless-stopped
    environment:
      - ENV=prod
      - PORT=8000
      - OPEN_ROUTER_BASE_URL=${OPEN_ROUTER_BASE_URL:-https://openrouter.ai/api/v1/chat/completions}
      - OPEN_ROUTER_API_KEY=${OPEN_ROUTER_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-openrouter/free}
      - BACKEND_BASE_URL=${BACKEND_BASE_URL}
      - ML_API_KEY=${ML_API_KEY}

  # 5. Adminer (Database Admin Tool)
  adminer:
    image: adminer
    restart: unless-stopped
    # Bind to localhost to prevent public access. Use SSH tunneling to access if remote.
    ports:
      - "8080:8080"

volumes:
  postgres_data:
