# docker-compose.prod.yml
# Digunakan oleh server production.
# Image di-pull dari GitHub Container Registry (ghcr.io), BUKAN di-build lokal.
# Ganti egikelo9 dengan username GitHub kamu.

version: "3.8"

services:
  # 1. Next.js Front-End
  frontend:
    image: ghcr.io/egikelo9/pijak-frontend:latest
    ports:
      - "3000:3000"
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_PUBLIC_ML_API_URL=${NEXT_PUBLIC_ML_API_URL}
    depends_on:
      - backend

  # 2. FastAPI Back-End
  backend:
    image: ghcr.io/egikelo9/pijak-backend:latest
    ports:
      - "5000:5000"
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DATABASE_NAME=${DATABASE_NAME}
      - ML_SERVICE_URL=${ML_SERVICE_URL:-http://ml_services:8000}
      - BACKEND_BASE_URL=${BACKEND_BASE_URL}
      - SECRET_KEY=${SECRET_KEY}
      - ALGORITHM=${ALGORITHM}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES}
      - ENV=prod
      - ML_API_KEY=${ML_API_KEY}
    depends_on:
      db:
        condition: service_healthy
      ml_services:
        condition: service_started

  # 3. PostgreSQL Database
  db:
    image: postgres:15-alpine
    ports:
      - "127.0.0.1:5432:5432"  # Bind ke localhost saja, lebih aman
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 4. ML Services
  ml_services:
    image: ghcr.io/egikelo9/pijak-ml-services:latest
    ports:
      - "8000:8000"
    restart: unless-stopped
    environment:
      - ENV=prod
      - PORT=8000
      - OPEN_ROUTER_BASE_URL=${OPEN_ROUTER_BASE_URL:-https://openrouter.ai/api/v1/chat/completions}
      - OPEN_ROUTER_API_KEY=${OPEN_ROUTER_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-nvidia/nemotron-3-super-120b-a12b:free}
      - BACKEND_BASE_URL=${BACKEND_BASE_URL}
      - ML_API_KEY=${ML_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}

  # 5. Adminer (Database Admin Tool)
  adminer:
    image: adminer
    restart: unless-stopped
    ports:
      - "8080:8080" 

volumes:
  postgres_data:
